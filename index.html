<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111116">
  <title>Arcade Vault</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="./styles/tokens.css">
  <link rel="stylesheet" href="./styles/layout.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/effects.css">
  <link rel="stylesheet" href="./styles/animations.css">
</head>
<body>
  
  <div id="marquee-container" aria-hidden="true">
    <div class="marquee-text" id="marquee-content"></div>
  </div>

  <header id="top-bar">
    <div class="logo">ARCADE VAULT</div>
    <nav class="tabs" aria-label="Game Categories">
      <button class="tab active" data-category="all"><span class="tab-icon">🕹️</span> <span class="tab-label">ALL</span></button>
      <button class="tab" data-category="action"><span class="tab-icon">💥</span> <span class="tab-label">ACTION</span></button>
      <button class="tab" data-category="puzzle"><span class="tab-icon">🧩</span> <span class="tab-label">PUZZLE</span></button>
      <button class="tab" data-category="classic"><span class="tab-icon">👾</span> <span class="tab-label">CLASSIC</span></button>
      <button id="toggle-settings" class="tab" title="Settings" style="margin-left:auto;"><span class="tab-icon">⚙️</span> <span class="tab-label">OPTIONS</span></button>
      <button id="toggle-crt" class="tab" title="Toggle CRT Filter"><span class="tab-icon">📺</span> <span class="tab-label">CRT</span></button>
    </nav>
    <div class="user-info">
      <div class="coin-count">🪙 <span id="ui-coin-count">0</span></div>
      <div class="initials-badge" id="ui-initials" style="cursor:pointer;" title="Click to view Achievements">---</div>
    </div>
  </header>

  <main id="main-content" role="main">
    <div class="toolbar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-4);">
      <input type="text" id="game-search" placeholder="🔍 SEARCH GAMES..." aria-label="Search Games">
      <div style="font-family:var(--font-arcade); font-size:10px; color:var(--text-secondary);">VAULT OS v1.0</div>
    </div>
    <div id="hub-grid"></div>
  </main>

  <div id="game-overlay" role="dialog" aria-modal="true" class="crt-screen">
    <div class="hud-strip">
      <div>SCORE: <span id="hud-score">0</span></div>
      <div><span id="hud-extra"></span></div>
      <button id="btn-quit-game" aria-label="Quit game">QUIT</button>
    </div>
    <div class="canvas-wrapper">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="touch-controls-panel"></div>
  </div>

      <input type="text" id="initials-input" maxlength="3" autocomplete="off" placeholder="AAA">
      <button id="btn-save-initials" class="btn-primary">SAVE</button>
    </div>
  </div>

  <!-- Player Profile Modal -->
  <div id="achievements-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h2 style="color:var(--neon-yellow)">PLAYER PROFILE</h2>
      
      <div id="profile-stats" style="margin-bottom:var(--space-4); text-align:left; font-family:var(--font-mono); font-size:12px; color:var(--text-primary);">
        <div style="display:flex; justify-content:space-between; margin-bottom:var(--space-2);">
          <span>MOST PLAYED:</span> <span id="stat-most-played" style="color:var(--neon-pink)">---</span>
        </div>
        <div style="margin-bottom:var(--space-1);">EXP LEVEL</div>
        <div style="width:100%; background:var(--surface); height:10px; border-radius:10px; overflow:hidden; border:1px solid var(--border);">
          <div id="stat-xp-bar" style="width:0%; height:100%; background:var(--neon-cyan); transition:width 0.5s var(--ease);"></div>
        </div>
      </div>

      <h3 style="color:var(--neon-green); font-size:14px; margin-top:var(--space-4); text-align:left;">🏆 BADGES</h3>
      <div id="achievements-list" style="text-align:left; font-size:10px; line-height:2; display:flex; flex-direction:column; gap:8px;"></div>
      <button id="btn-close-achievements" class="btn-secondary" style="margin-top:16px;">CLOSE</button>
    </div>
  </div>

  <!-- Settings Modal (Phase 2) -->
  <div id="settings-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h2 style="color:var(--accent)">OPTIONS</h2>
      <div style="text-align:left; font-size:12px; font-family:var(--font-mono); margin-bottom:20px;">
        <p style="margin-bottom:10px;"><strong>CUSTOM CONTROLS</strong></p>
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
          <span>ACTION BUTTON (FIRE):</span>
          <button id="btn-remap-action" class="btn-secondary" style="padding:4px 8px; font-size:10px;">Space</button>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
          <span>PAUSE / MENU:</span>
          <button id="btn-remap-pause" class="btn-secondary" style="padding:4px 8px; font-size:10px;">Escape</button>
        </div>
        <p style="color:var(--text-secondary); font-size:10px; margin-top:10px;">* Click a button and press a new key to re-bind *</p>
      </div>
      <button id="btn-close-settings" class="btn-primary">SAVE & CLOSE</button>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="game-over-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content crt-screen">
      <h2 style="color:var(--neon-pink)">GAME OVER</h2>
      <p style="color:var(--neon-cyan); margin:10px 0;">SCORE: <span id="go-score">0</span></p>
      <div class="modal-actions">
        <button id="btn-play-again" class="btn-primary">PLAY AGAIN</button>
        <button id="btn-back-hub" class="btn-secondary">ARCADE HUB</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/state.js"></script>
  <script type="module" src="./js/hub.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered!', reg))
          .catch(err => console.error('SW registration failed!', err));
      });
    }
  </script>
</body>
</html>
